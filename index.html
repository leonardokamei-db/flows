<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flow Studio — Construtor de WhatsApp Flows</title>
</head>
<body>
<style>
  :root{
    --bg:#e9eeec; --surface:#ffffff; --surface-2:#f4f7f6; --surface-3:#eef2f0;
    --border:#e0e6e3; --border-strong:#cfd8d4;
    --text:#0d1b16; --text-2:#56685f; --text-3:#82948c;
    --accent:#12a67e; --accent-deep:#0b7a5d; --accent-ink:#075e54;
    --accent-bright:#25d366; --accent-soft:#e3f6ee;
    --danger:#d92d20; --danger-soft:#fdecea;
    --warn:#b45309; --warn-soft:#fdf1e0;
    --ok:#0a7d55;
    --shadow-sm:0 1px 2px rgba(6,32,24,.06),0 1px 3px rgba(6,32,24,.05);
    --shadow-md:0 4px 16px rgba(6,32,24,.10),0 2px 6px rgba(6,32,24,.06);
    --shadow-lg:0 24px 60px rgba(6,32,24,.28);
    --r-sm:7px; --r-md:11px; --r-lg:16px;
    --font:"Segoe UI Variable Display","Segoe UI",-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;
    --mono:"Cascadia Code","SF Mono",ui-monospace,"Consolas","Menlo",monospace;
    /* Cores fixas do "telefone" (independem do tema do app) */
    --wa:#008069; --wa2:#00a884; --wa-body:#ffffff; --wa-chat:#efe7de;
    --wa-ink:#111b21; --wa-mut:#667781; --wa-inp:#f0f2f5; --wa-line:#e9edef;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0a1310; --surface:#0f1a16; --surface-2:#14211c; --surface-3:#1a2924;
      --border:#233029; --border-strong:#31463c;
      --text:#e7f0ec; --text-2:#9bb0a7; --text-3:#71857c;
      --accent:#25d38a; --accent-deep:#1fb877; --accent-ink:#8fe9c4;
      --accent-bright:#25d366; --accent-soft:#123026;
      --danger:#ff6b5e; --danger-soft:#2a1512; --warn:#e0a24a; --warn-soft:#2a2010; --ok:#38d39a;
      --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 6px 22px rgba(0,0,0,.5);
      --shadow-lg:0 30px 70px rgba(0,0,0,.65);
    }
  }
  :root[data-theme="light"]{
    --bg:#e9eeec; --surface:#ffffff; --surface-2:#f4f7f6; --surface-3:#eef2f0;
    --border:#e0e6e3; --border-strong:#cfd8d4; --text:#0d1b16; --text-2:#56685f; --text-3:#82948c;
    --accent:#12a67e; --accent-deep:#0b7a5d; --accent-ink:#075e54; --accent-soft:#e3f6ee;
    --danger:#d92d20; --danger-soft:#fdecea; --warn:#b45309; --warn-soft:#fdf1e0; --ok:#0a7d55;
    --shadow-sm:0 1px 2px rgba(6,32,24,.06),0 1px 3px rgba(6,32,24,.05);
    --shadow-md:0 4px 16px rgba(6,32,24,.10),0 2px 6px rgba(6,32,24,.06);
    --shadow-lg:0 24px 60px rgba(6,32,24,.28);
  }
  :root[data-theme="dark"]{
    --bg:#0a1310; --surface:#0f1a16; --surface-2:#14211c; --surface-3:#1a2924;
    --border:#233029; --border-strong:#31463c; --text:#e7f0ec; --text-2:#9bb0a7; --text-3:#71857c;
    --accent:#25d38a; --accent-deep:#1fb877; --accent-ink:#8fe9c4; --accent-soft:#123026;
    --danger:#ff6b5e; --danger-soft:#2a1512; --warn:#e0a24a; --warn-soft:#2a2010; --ok:#38d39a;
    --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 6px 22px rgba(0,0,0,.5); --shadow-lg:0 30px 70px rgba(0,0,0,.65);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden;}
  button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;}
  ::-webkit-scrollbar{width:11px;height:11px;}
  ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:20px;border:3px solid transparent;background-clip:padding-box;}
  ::-webkit-scrollbar-thumb:hover{background:var(--text-3);background-clip:padding-box;}
  ::-webkit-scrollbar-track{background:transparent;}
  .ic{display:block;flex:none;}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);}

  /* ---------- App shell ---------- */
  .app{display:grid;grid-template-rows:auto 1fr;height:100vh;height:100dvh;min-width:0;}
  .topbar{display:flex;align-items:center;gap:14px;padding:0 16px;height:58px;
    background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);z-index:20;}
  .brand{display:flex;align-items:center;gap:11px;padding-right:6px;}
  .brand-logo{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:#fff;
    background:linear-gradient(140deg,var(--accent-bright),var(--accent-deep));box-shadow:var(--shadow-sm);}
  .brand-txt b{display:block;font-size:14.5px;font-weight:700;letter-spacing:-.2px;line-height:1.1;}
  .brand-txt span{display:block;font-size:11px;color:var(--text-2);letter-spacing:.2px;}
  .top-sep{width:1px;height:26px;background:var(--border);}
  .top-spacer{flex:1;}
  .ver-wrap{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-2);}
  .ver-wrap select{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);
    padding:6px 8px;font-weight:600;color:var(--text);}
  .btn{display:inline-flex;align-items:center;gap:7px;height:36px;padding:0 13px;border-radius:var(--r-sm);
    font-weight:600;font-size:13px;color:var(--text);background:var(--surface-2);border:1px solid var(--border);
    transition:.14s ease;white-space:nowrap;}
  .btn:hover{background:var(--surface-3);border-color:var(--border-strong);}
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:linear-gradient(140deg,var(--accent),var(--accent-deep));color:#fff;border-color:transparent;box-shadow:var(--shadow-sm);}
  .btn.primary:hover{filter:brightness(1.05);}
  .btn.icon{width:36px;padding:0;justify-content:center;}
  .btn.ghost{background:transparent;border-color:transparent;}
  .btn.ghost:hover{background:var(--surface-2);}
  .btn:disabled{opacity:.4;pointer-events:none;}
  .btn.sm{height:30px;padding:0 10px;font-size:12px;}

  .main{display:grid;grid-template-columns:266px minmax(0,1fr) 340px;min-height:0;overflow:hidden;}

  /* ---------- Palette ---------- */
  .palette{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:14px 12px 40px;}
  .palette-hd{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text-3);
    padding:14px 8px 7px;}
  .palette-hd:first-child{padding-top:2px;}
  .pal-item{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:var(--r-sm);
    border:1px solid transparent;cursor:grab;transition:.12s ease;user-select:none;}
  .pal-item:hover{background:var(--surface-2);border-color:var(--border);}
  .pal-item:active{cursor:grabbing;}
  .pal-ico{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none;
    background:var(--accent-soft);color:var(--accent-deep);}
  .pal-item[data-cat="logic"] .pal-ico{background:#efe7fb;color:#7c3aed;}
  @media (prefers-color-scheme: dark){.pal-item[data-cat="logic"] .pal-ico{background:#241a3a;color:#b79bf5;}}
  :root[data-theme="dark"] .pal-item[data-cat="logic"] .pal-ico{background:#241a3a;color:#b79bf5;}
  .pal-tx b{display:block;font-size:13px;font-weight:600;line-height:1.15;}
  .pal-tx span{display:block;font-size:11px;color:var(--text-2);line-height:1.2;}
  .pal-hint{margin:6px 4px 2px;font-size:11px;color:var(--text-3);line-height:1.4;
    background:var(--surface-2);border:1px dashed var(--border-strong);border-radius:var(--r-sm);padding:8px 10px;}

  /* ---------- Stage / phone ---------- */
  .stage{display:flex;flex-direction:column;min-width:0;background:
     radial-gradient(circle at 22px 22px, var(--border) 1.3px, transparent 0) 0 0/24px 24px;}
  .tabs{display:flex;align-items:center;gap:6px;padding:10px 14px;overflow-x:auto;
    background:var(--surface);border-bottom:1px solid var(--border);min-height:52px;}
  .tab{display:flex;align-items:center;gap:8px;padding:7px 11px;border-radius:var(--r-sm);
    background:var(--surface-2);border:1px solid var(--border);font-weight:600;font-size:12.5px;color:var(--text-2);
    white-space:nowrap;transition:.12s;max-width:220px;}
  .tab .tdot{width:8px;height:8px;border-radius:50%;background:var(--border-strong);flex:none;}
  .tab.start .tdot{background:var(--accent);}
  .tab.term .tdot{background:#7c3aed;}
  .tab:hover{border-color:var(--border-strong);color:var(--text);}
  .tab.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-deep);}
  .tab .tname{overflow:hidden;text-overflow:ellipsis;}
  .tab-add{width:34px;height:34px;border-radius:var(--r-sm);border:1px dashed var(--border-strong);
    display:grid;place-items:center;color:var(--text-2);flex:none;}
  .tab-add:hover{color:var(--accent-deep);border-color:var(--accent);background:var(--accent-soft);}

  .canvas-scroll{flex:1;overflow:auto;display:flex;justify-content:center;align-items:flex-start;padding:30px 20px 90px;}
  .phone{width:352px;flex:none;border-radius:42px;background:#0b0f0e;padding:11px;
    box-shadow:var(--shadow-lg),0 0 0 2px rgba(0,0,0,.35);position:relative;}
  .phone::after{content:"";position:absolute;top:20px;left:50%;transform:translateX(-50%);
    width:120px;height:26px;background:#0b0f0e;border-radius:0 0 16px 16px;z-index:5;}
  .phone-screen{border-radius:32px;overflow:hidden;background:var(--wa-body);height:720px;display:flex;flex-direction:column;}
  .wa-head{background:var(--wa);color:#fff;padding:34px 12px 12px;display:flex;align-items:center;gap:12px;flex:none;}
  .wa-head .wa-back{opacity:.95;}
  .wa-head .wa-title{flex:1;min-width:0;}
  .wa-head .wa-title b{display:block;font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .wa-head .wa-title span{display:block;font-size:11px;opacity:.85;}
  .wa-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 15px 22px;background:var(--wa-body);color:var(--wa-ink);}
  .wa-body::-webkit-scrollbar{width:6px;}
  .wa-body::-webkit-scrollbar-thumb{background:#d3dbd7;}
  .term-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;
    background:rgba(255,255,255,.2);padding:3px 8px;border-radius:20px;letter-spacing:.3px;}

  /* dropzones & nodes inside phone */
  .dropzone{min-height:16px;display:flex;flex-direction:column;gap:11px;}
  .dropzone.root{min-height:100%;gap:12px;}
  .dz-empty{border:2px dashed var(--wa-line);border-radius:12px;padding:26px 14px;text-align:center;
    color:var(--wa-mut);font-size:12.5px;background:#fbfdfc;}
  .dz-empty.small{padding:14px;font-size:11.5px;}
  .cnode{position:relative;border-radius:11px;transition:box-shadow .12s;cursor:pointer;}
  .cnode>.cnode-tools{position:absolute;top:-11px;right:6px;display:none;gap:2px;z-index:6;
    background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px;box-shadow:var(--shadow-md);}
  .cnode:hover>.cnode-tools,.cnode.sel>.cnode-tools{display:flex;}
  .cnode-tools button{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;color:var(--text-2);}
  .cnode-tools button:hover{background:var(--surface-2);color:var(--text);}
  .cnode-tools button.del:hover{background:var(--danger-soft);color:var(--danger);}
  .cnode-tools .grip{cursor:grab;}
  .cnode-inner{border-radius:10px;outline:2px solid transparent;outline-offset:2px;transition:.12s;}
  .cnode:hover>.cnode-inner{outline-color:var(--wa-line);}
  .cnode.sel>.cnode-inner{outline-color:var(--accent);}
  .cnode.dragging{opacity:.4;}
  .placeholder{height:3px;border-radius:3px;background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);margin:2px 0;}

  /* WA component visuals */
  .wa-h1{font-size:21px;font-weight:700;line-height:1.25;color:var(--wa-ink);margin:2px 0;}
  .wa-h2{font-size:16px;font-weight:600;color:var(--wa-ink);}
  .wa-body-t{font-size:14px;color:#3b4a54;line-height:1.5;}
  .wa-cap{font-size:12px;color:var(--wa-mut);line-height:1.45;}
  .wa-strike{text-decoration:line-through;}
  .wa-label{font-size:13px;font-weight:600;color:var(--wa-ink);margin-bottom:6px;display:block;}
  .wa-help{font-size:11.5px;color:var(--wa-mut);margin-top:5px;}
  .wa-field{background:var(--wa-inp);border:1px solid transparent;border-radius:10px;padding:12px 13px;
    color:var(--wa-mut);font-size:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .wa-field.area{min-height:64px;align-items:flex-start;}
  .wa-opt{display:flex;align-items:center;gap:11px;padding:9px 2px;}
  .wa-opt .box{width:20px;height:20px;border:2px solid #c4cdc8;border-radius:6px;flex:none;}
  .wa-opt .box.round{border-radius:50%;}
  .wa-opt .box.on{border-color:var(--wa);background:var(--wa);}
  .wa-opt .t b{display:block;font-size:14px;color:var(--wa-ink);font-weight:500;}
  .wa-opt .t span{display:block;font-size:11.5px;color:var(--wa-mut);}
  .wa-optlist{display:flex;flex-direction:column;}
  .wa-optlist .wa-opt+.wa-opt{border-top:1px solid var(--wa-line);}
  .wa-cta{background:var(--wa);color:#fff;text-align:center;font-weight:600;font-size:15px;
    padding:13px;border-radius:24px;box-shadow:0 3px 10px rgba(0,128,105,.25);}
  .wa-cta.small{padding:11px;font-size:14px;}
  .wa-link{color:#027eb5;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:5px;}
  .wa-img{width:100%;border-radius:12px;background:var(--wa-inp);display:grid;place-items:center;
    color:var(--wa-mut);overflow:hidden;min-height:120px;}
  .wa-img img{width:100%;display:block;object-fit:cover;}
  .wa-rich h1{font-size:20px;font-weight:700;margin:6px 0 4px;}
  .wa-rich h2{font-size:15px;font-weight:600;margin:6px 0 3px;}
  .wa-rich p{font-size:13.5px;color:#3b4a54;margin:5px 0;line-height:1.5;}
  .wa-rich ul,.wa-rich ol{margin:5px 0;padding-left:20px;font-size:13.5px;color:#3b4a54;}
  .wa-rich a{color:#027eb5;}

  /* logic nodes */
  .logic{border-radius:12px;border:1.5px solid #d9c9f7;background:linear-gradient(180deg,#faf7ff,#f4eeff);
    padding:10px;color:#4a2c85;}
  .logic-hd{display:flex;align-items:center;gap:8px;font-weight:700;font-size:12px;letter-spacing:.3px;color:#6d28d9;margin-bottom:4px;}
  .logic-hd .cond{font-family:var(--mono);font-size:11px;font-weight:600;background:#fff;border:1px solid #e4d9fb;
    border-radius:6px;padding:2px 7px;color:#5b21b6;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .branch{margin-top:8px;}
  .branch-lbl{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#7c3aed;margin:0 0 5px 2px;
    display:flex;align-items:center;gap:6px;}
  .branch-lbl .pill{background:#ede4ff;padding:1px 7px;border-radius:12px;}
  .branch .dropzone{background:rgba(255,255,255,.7);border-radius:9px;padding:8px;border:1px dashed #dccdf7;}

  /* ---------- Inspector ---------- */
  .inspector{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
  .insp-hd{padding:15px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:3;}
  .insp-hd .k{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-3);}
  .insp-hd .n{display:flex;align-items:center;gap:9px;margin-top:5px;}
  .insp-hd .n .ci{width:30px;height:30px;border-radius:8px;background:var(--accent-soft);color:var(--accent-deep);display:grid;place-items:center;flex:none;}
  .insp-hd .n b{font-size:15px;font-weight:700;letter-spacing:-.2px;}
  .insp-hd .n .type{font-size:11px;color:var(--text-2);font-family:var(--mono);}
  .insp-body{padding:6px 16px 40px;}
  .fld{margin-top:15px;}
  .fld>label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;}
  .fld .sub{font-weight:400;color:var(--text-3);font-size:11px;}
  .inp,.sel,.ta{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);
    padding:9px 10px;color:var(--text);transition:.12s;}
  .inp:focus,.sel:focus,.ta:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);background:var(--surface);}
  .ta{resize:vertical;min-height:64px;line-height:1.45;}
  .ta.mono{font-family:var(--mono);font-size:12px;}
  .cnt{font-size:10.5px;color:var(--text-3);text-align:right;margin-top:3px;font-variant-numeric:tabular-nums;}
  .cnt.over{color:var(--danger);font-weight:600;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .switch{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;}
  .switch .lb b{display:block;font-size:12.5px;font-weight:600;}
  .switch .lb span{display:block;font-size:11px;color:var(--text-2);}
  .tgl{width:40px;height:23px;border-radius:20px;background:var(--border-strong);position:relative;transition:.16s;flex:none;}
  .tgl::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.16s;box-shadow:var(--shadow-sm);}
  .tgl.on{background:var(--accent);}
  .tgl.on::after{transform:translateX(17px);}
  .insp-sec{margin-top:20px;padding-top:14px;border-top:1px solid var(--border);}
  .insp-sec .sec-t{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-3);margin-bottom:2px;}

  /* option/pair editors */
  .opt-row,.pair-row{display:flex;gap:7px;align-items:center;margin-top:8px;}
  .opt-card{border:1px solid var(--border);border-radius:var(--r-sm);padding:9px;margin-top:9px;background:var(--surface-2);}
  .opt-card .oc-hd{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
  .opt-card .oc-hd .oi{width:20px;height:20px;border-radius:5px;background:var(--surface-3);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--text-2);}
  .opt-card .grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .mini{font-size:11px;color:var(--text-2);margin-bottom:3px;display:block;font-weight:600;}
  .x-btn{width:30px;height:34px;flex:none;border-radius:var(--r-sm);background:var(--surface-2);border:1px solid var(--border);display:grid;place-items:center;color:var(--text-2);}
  .x-btn:hover{background:var(--danger-soft);color:var(--danger);border-color:var(--danger-soft);}
  .add-btn{margin-top:10px;width:100%;height:36px;border:1px dashed var(--border-strong);border-radius:var(--r-sm);
    display:flex;align-items:center;justify-content:center;gap:7px;color:var(--accent-deep);font-weight:600;font-size:12.5px;background:var(--surface-2);}
  .add-btn:hover{background:var(--accent-soft);border-color:var(--accent);}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
  .chip{font-family:var(--mono);font-size:11px;padding:4px 8px;border-radius:6px;background:var(--surface-3);
    border:1px solid var(--border);color:var(--text-2);}
  .chip:hover{border-color:var(--accent);color:var(--accent-deep);background:var(--accent-soft);}
  .note{font-size:11.5px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);
    border-left:3px solid var(--accent);border-radius:var(--r-sm);padding:9px 11px;margin-top:12px;line-height:1.45;}
  .empty-insp{padding:60px 24px;text-align:center;color:var(--text-3);}
  .empty-insp .ei-ic{width:54px;height:54px;border-radius:14px;background:var(--surface-2);display:grid;place-items:center;margin:0 auto 14px;color:var(--text-3);}

  .tool-btns{display:flex;gap:6px;margin-top:12px;}
  .tool-btns .btn{flex:1;justify-content:center;}

  /* ---------- Modal ---------- */
  .backdrop{position:fixed;inset:0;background:rgba(9,20,16,.55);backdrop-filter:blur(3px);z-index:100;
    display:none;align-items:center;justify-content:center;padding:24px;}

/* ---------- markdown mínimo p/ preview ---------- */
function mdInline(t){
  t = esc(t);
  t = t.replace(/~~\*\*\*(.+?)\*\*\*~~/g,'<del><strong><em>$1</em></strong></del>');
  t = t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/~~(.+?)~~/g,'<del>$1</del>');
  t = t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t = t.replace(/\[(.+?)\]\((.+?)\)/g,'<a>$1</a>');
  return t;
}
function renderRich(lines){
  const arr = Array.isArray(lines)? lines : String(lines||'').split(/\n/);
  let html=''; let list=null;
  const closeList=()=>{ if(list){ html+='</'+list+'>'; list=null; } };
  for(let raw of arr){
    const l=(raw||'').trim();
    if(!l){ closeList(); continue; }
    if(/^#\s+/.test(l)){ closeList(); html+='<h1>'+mdInline(l.replace(/^#\s+/,''))+'</h1>'; }
    else if(/^##\s+/.test(l)){ closeList(); html+='<h2>'+mdInline(l.replace(/^##\s+/,''))+'</h2>'; }
    else if(/^#{3,}\s+/.test(l)){ closeList(); html+='<p>'+mdInline(l.replace(/^#{3,}\s+/,''))+'</p>'; }
    else if(/^[-+*]\s+/.test(l)){ if(list!=='ul'){closeList();list='ul';html+='<ul>';} html+='<li>'+mdInline(l.replace(/^[-+*]\s+/,''))+'</li>'; }
    else if(/^\d+\.\s+/.test(l)){ if(list!=='ol'){closeList();list='ol';html+='<ol>';} html+='<li>'+mdInline(l.replace(/^\d+\.\s+/,''))+'</li>'; }
    else { closeList(); html+='<p>'+mdInline(l)+'</p>'; }
  }
  closeList();
  return html||'<p style="color:var(--wa-mut)">Texto formatado…</p>';
}
function optList(node, round){
  const ds = node.props['data-source']||[];
  if(!ds.length) return '<div class="dz-empty small">Sem opções — adicione no painel</div>';
  return '<div class="wa-optlist">'+ds.slice(0,8).map((o,i)=>
    '<div class="wa-opt"><span class="box '+(round?'round':'')+(i===0?' on':'')+'"></span>'+
    '<span class="t"><b>'+esc(o.title||'Opção')+'</b>'+(o.description?'<span>'+esc(o.description)+'</span>':'')+'</span></div>'
  ).join('')+(ds.length>8?'<div class="wa-cap" style="padding:6px 2px">+ '+(ds.length-8)+' opções</div>':'')+'</div>';
}

function makeNode(type){
  const def = COMPONENTS[type];
  const n = { _id:uid(), type, props:clone(def.defaults||{}) };
  if(def.branches){ n.then=[]; n.else=[]; }
  if(def.isSwitch){ n.cases={ 'caso_1':[] }; }
  return n;
}
function mk(type, over){ const n=makeNode(type); Object.assign(n.props, over||{}); return n; }

function currentScreen(){ return state.flow.screens.find(s=>s._id===state.currentId) || state.flow.screens[0]; }
function childArrays(node){
  if(node.type==='If') return [node.then, node.else];
  if(node.type==='Switch') return Object.values(node.cases);
  return [];
}
function walk(nodes, fn, parent){ for(const n of nodes){ fn(n,parent); childArrays(n).forEach(a=>walk(a,fn,n)); } }
function findNode(id, nodes){ nodes=nodes||currentScreen().children; let found=null;
  walk(nodes, n=>{ if(n._id===id) found=n; }); return found; }
function findWithParent(id, nodes){ nodes=nodes||currentScreen().children; let res=null;
  const rec=(arr)=>{ for(let i=0;i<arr.length;i++){ if(arr[i]._id===id){res={arr,index:i,node:arr[i]};return;} childArrays(arr[i]).forEach(rec); if(res)return; } };
  rec(nodes); return res; }
// resolve o array (dropzone) a partir da "key"
function getArrayByKey(key){
  const p = key.split('|');
  if(p[0]==='s') return currentScreen().children;
  const node = findNode(p[1]);
  if(!node) return null;
  if(p[0]==='t') return node.then;
  if(p[0]==='e') return node.else;
  if(p[0]==='c') return node.cases[decodeURIComponent(p[2])];

}

function applySnap(str){ const o=JSON.parse(str); state.flow=o.flow; state.currentId=o.currentId;
  if(!currentScreen()) state.currentId=state.flow.screens[0]&&state.flow.screens[0]._id; state.sel={kind:'screen'}; }

function undo(){ if(!undoStack.length) return; redoStack.push(snapshot()); applySnap(undoStack.pop()); saveLocal(); render(); toast('Desfeito'); }
function redo(){ if(!redoStack.length) return; undoStack.push(snapshot()); applySnap(redoStack.pop()); saveLocal(); render(); toast('Refeito'); }

/* ---- Simulação dinâmica: respostas do usuário, condições e campos interativos ---- */
function buildFormMap(){ const m={};
  state.flow.screens.forEach(s=>walk(s.children,n=>{ if(n.props&&n.props.name&&(n._id in state.playData)) m[n.props.name]=state.playData[n._id]; }));
  return m; }
// Avalia uma condição do If com os valores preenchidos no teste. true/false, ou null se não avaliável.
function playEvalCondition(cond){
  if(!cond) return null;
  const form=buildFormMap(); let bad=false;
  const expr=String(cond).replace(/\$\{\s*(form|data|screen)\.([A-Za-z0-9_.\-]+)\s*\}/g,(m,scope,key)=>{
    const v=(scope==='form')?form[key]:undefined;
    if(v===undefined) return 'undefined';
    try{ return JSON.stringify(v); }catch(e){ bad=true; return 'undefined'; } });
  if(bad||/\$\{/.test(expr)) return null;
  const stripped=expr.replace(/"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'/g,'').replace(/\b(?:true|false|null|undefined)\b/g,'');
  if(!/^[\s0-9+\-*\/%()!<>=&|.,\[\]]*$/.test(stripped)) return null;
  try{ return !!(new Function('return ('+expr+');'))(); }catch(e){ return null; }
}
function resolvePlayValue(tpl){
  if(tpl==null) return '';
  const form=buildFormMap();
  return String(tpl).replace(/\$\{\s*(form|data|screen)\.([A-Za-z0-9_.\-]+)\s*\}/g,(m,scope,key)=>{
    const v=(scope==='form')?form[key]:undefined; return v==null?'':String(v); }).trim();
}
// Ramificações If/Switch reagem às respostas do teste; sem valor avaliável, caem no "então"/1º caso.
function flattenPlay(nodes){ const out=[];
  for(const n of (nodes||[])){
    if(n.type==='If'){ const r=playEvalCondition(n.props&&n.props.condition);
      out.push(...flattenPlay(r===false?(n.else||[]):(n.then||[]))); }
    else if(n.type==='Switch'){ const v=resolvePlayValue(n.props&&n.props.value);
      const keys=Object.keys(n.cases||{}); const k=keys.includes(v)?v:keys[0];
      out.push(...flattenPlay((k!==undefined&&n.cases[k])||[])); }
    else out.push(n);
  } return out; }
function playSigNow(){ return flattenPlay(currentScreen().children).map(n=>n._id).join(','); }
function validatePlayScreen(){
  const errs={};
  for(const n of flattenPlay(currentScreen().children)){
    const p=n.props||{}; if(p.visible===false) continue;
    const v=state.playData[n._id];
    if(n.type==='TextInput'||n.type==='TextArea'){
      const s=(v==null?'':String(v)).trim();
      if(p.required&&!s){ errs[n._id]='Campo obrigatório'; continue; }
      const mn=+p['min-chars'];
      if(n.type==='TextInput'&&mn>0&&s&&s.length<mn) errs[n._id]='Mínimo de '+mn+' caracteres';
      if(n.type==='TextInput'&&p['input-type']==='email'&&s&&!/^\S+@\S+\.\S+$/.test(s)) errs[n._id]='E-mail inválido';
    } else if(n.type==='Dropdown'||n.type==='RadioButtonsGroup'){
      if(p.required&&!v) errs[n._id]='Escolha uma opção';
    } else if(n.type==='CheckboxGroup'&&p.required){
      const min=Math.max(1,+p['min-selected-items']||1);
      if(!Array.isArray(v)||v.length<min) errs[n._id]=(min>1?'Escolha ao menos '+min+' opções':'Escolha ao menos uma opção');
    } else if(n.type==='OptIn'&&p.required&&!v) errs[n._id]='É preciso aceitar para continuar';
  }
  return errs;
}

    return lab+'<input type="date" class="wa-inp-real" data-pinput="'+nid+'" data-pfield="start" value="'+esc(v.start||'')+'">'+help+errH;

  }

  if(node.type==='EmbeddedLink') return '<span class="wa-link">'+icon('link',15)+esc(p.text||'Link')+'</span>';

}
function handlePlayClick(e){
  if(e.target.closest('[data-restart]')){ playRestart(); return; }
  const t=e.target;
  if(t.closest('input,select,textarea')) return; // controles nativos cuidam de si
  const pa=t.closest('[data-playact]');
  if(pa){ const nd=pa.closest('[data-node]'); const node=nd&&findNode(nd.dataset.node);
    const a=node&&node.props['on-click-action']; if(a&&a.name&&a.name!=='none') doPlayAction(a); return; }
  const ck=t.closest('[data-pcheck]');
  if(ck){ const nid=ck.dataset.pcheck, oid=ck.dataset.opt; const node=findNode(nid); const p=(node&&node.props)||{};
    let arr=Array.isArray(state.playData[nid])?state.playData[nid].slice():[];
    if(arr.includes(oid)) arr=arr.filter(x=>x!==oid);
    else{ const mx=+p['max-selected-items']; if(mx>0&&arr.length>=mx){ toast('Máximo de '+mx+' opções','warn'); return; } arr.push(oid); }
    state.playData[nid]=arr; delete state.playErr[nid]; renderCanvas(); return; }
  const rd=t.closest('[data-pradio]');
  if(rd){ state.playData[rd.dataset.pradio]=rd.dataset.opt; delete state.playErr[rd.dataset.pradio]; renderCanvas(); return; }
  const op=t.closest('[data-poptin]');
  if(op){ const nid=op.dataset.poptin; state.playData[nid]=!state.playData[nid]; delete state.playErr[nid]; renderCanvas(); return; }
  const nd=t.closest('[data-playnav]'); if(!nd) return;
  const node=findNode(nd.dataset.node); if(!node) return;
  let a=node.props['on-click-action']; if(!a||!a.name||a.name==='none') a=node.props['on-select-action'];
  if(!a||!a.name||a.name==='none') return;
  if(node.type==='Footer'){ const errs=validatePlayScreen();
    if(Object.keys(errs).length){ state.playErr=errs; renderCanvas();
      const first=$('#canvasRoot .perr'); if(first&&typeof first.scrollIntoView==='function') first.scrollIntoView({behavior:'smooth',block:'center'});
      toast('Preencha os campos destacados','warn'); return; } }
  doPlayAction(a);
}
function doPlayAction(a){
  if(a.name==='navigate'){ const s=state.flow.screens.find(x=>x.id===a.next);
    if(s){ state.navStack.push(state.currentId); state.currentId=s._id; state.done=false; state.playErr={};
      state.navDir='fwd'; state.animScreen=true; renderUxBar(); render(); }
    else toast('Este botão ainda não tem uma tela de destino','warn'); }
  else if(a.name==='complete'){ state.done=true; state.playErr={}; state.navDir='fwd'; state.animScreen=true; renderUxBar(); render(); }
  else if(a.name==='open_url'){ toast('Abriria o link: '+(a.url||'(sem URL)')); }
  else toast('Ação de dados — simulada no teste'); }

/* ============================ INSPECTOR ============================ */
function tgl(on){ return '<span class="tgl'+(on?' on':'')+'"></span>'; }
function counter(v,max){ if(!max) return ''; const l=String(v||'').length; return '<div class="cnt'+(l>max?' over':'')+'">'+l+' / '+max+'</div>'; }
function labelHtml(f){ return '<label>'+esc(f.label)+(f.req?' <span class="sub">· obrigatório</span>':'')+'</label>'; }
function helpHtml(f){ return f.help?'<div style="font-size:11px;color:var(--text-3);margin-top:5px;line-height:1.4">'+esc(f.help)+'</div>':''; }

function renderField(node,f){
  if(isUX() && UX_HIDE.has(f.key)) return '';
  const v=node.props[f.key];
  if(f.type==='boolean'){
    const on = (v===undefined? !!f.def : !!v);
    return '<div class="switch" data-toggle="comp|'+f.key+'"><div class="lb"><b>'+esc(f.label)+'</b>'+
      (f.help?'<span>'+esc(f.help)+'</span>':'')+'</div>'+tgl(on)+'</div>';
  }
  let inner='';
  if(f.type==='text') inner='<input class="inp" data-f="'+f.key+'"'+(f.max?' maxlength="'+f.max+'"':'')+' value="'+esc(v||'')+'" placeholder="'+esc(f.placeholder||'')+'">'+counter(v,f.max);
  else if(f.type==='textarea') inner='<textarea class="ta" data-f="'+f.key+'"'+(f.max?' maxlength="'+f.max+'"':'')+'>'+esc(v||'')+'</textarea>'+counter(v,f.max);
  else if(f.type==='number') inner='<input type="number" class="inp" data-f="'+f.key+'" value="'+(v==null?'':esc(v))+'">';
  else if(f.type==='select'){ const cur=(v==null?f.def:v);
    inner='<select class="sel" data-f="'+f.key+'">'+f.opts.map(o=>'<option value="'+esc(o)+'"'+(cur===o?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>'; }
  else if(f.type==='lines') inner='<textarea class="ta" data-f="'+f.key+'" data-lines="1" style="min-height:110px">'+esc(Array.isArray(v)?v.join('\n'):(v||''))+'</textarea>';
  else if(f.type==='condition') inner=conditionEditor(v);
  else if(f.type==='options') inner=optionsEditor(node,f.key);
  else if(f.type==='action') inner=isUX()?uxActionEditor(node,f):actionEditor(node,f);
  else if(f.type==='image') inner=imageEditor(node,f.key);
  return '<div class="fld">'+labelHtml(f)+inner+helpHtml(f)+'</div>';
}
function conditionEditor(v){
  const chips=['${form.','${data.','} ','== true','== \'\'','!= ','&& ','|| ','> ','< ','!','( )'];
  return '<textarea class="ta mono" id="condTA" data-f="condition" style="min-height:70px">'+esc(v||'')+'</textarea>'+
    '<div class="chips">'+chips.map(c=>'<button class="chip" data-insert="'+esc(c)+'">'+esc(c)+'</button>').join('')+'</div>'+
    '<div style="font-size:11px;color:var(--text-3);margin-top:6px;line-height:1.4">Use uma variável dinâmica e resolva em booleano. Ex.: <code>${form.aceite} == true</code></div>';
}
function optionsEditor(node,key){
  const ds=node.props[key]||[]; const ux=isUX();
  const rows=ds.map((o,i)=>
    '<div class="opt-card"><div class="oc-hd"><span class="oi">'+(i+1)+'</span>'+
      '<input class="inp" data-optf="title" data-optidx="'+i+'" maxlength="30" value="'+esc(o.title||'')+'" placeholder="Título da opção">'+
      '<button class="x-btn" data-optdel="'+i+'">'+icon('trash',13)+'</button></div>'+
      (ux
        ? '<div><span class="mini">Descrição (opcional)</span><input class="inp" data-optf="description" data-optidx="'+i+'" maxlength="300" value="'+esc(o.description||'')+'" placeholder="Texto de apoio"></div>'
        : '<div class="grid"><div><span class="mini">id</span><input class="inp" data-optf="id" data-optidx="'+i+'" value="'+esc(o.id||'')+'"></div>'+
          '<div><span class="mini">Descrição</span><input class="inp" data-optf="description" data-optidx="'+i+'" maxlength="300" value="'+esc(o.description||'')+'"></div></div>')
      +'</div>'
  ).join('');
  return '<div data-optkey="'+esc(key)+'">'+rows+'<button class="add-btn" data-optadd>'+icon('plus',15)+'Adicionar opção</button></div>';
}
function actionEditor(node,f){
  const allowed=f.allowed||['navigate','complete','data_exchange','open_url'];
  let a=node.props[f.key];
  if(!a||!a.name) a={name:allowed[0], payload:[]};
  let h='<div class="opt-card" data-actkey="'+esc(f.key)+'">'+
    '<span class="mini">Tipo de ação</span><select class="sel" data-act="name">'+
    allowed.map(x=>'<option value="'+x+'"'+(a.name===x?' selected':'')+'>'+esc(ACT_LABEL[x]||x)+'</option>').join('')+'</select>';
  if(a.name==='navigate'){
    h+='<div style="margin-top:9px"><span class="mini">Tela de destino</span><select class="sel" data-act="next">'+
      '<option value="">— selecione a tela —</option>'+
      state.flow.screens.map(s=>'<option value="'+esc(s.id)+'"'+(a.next===s.id?' selected':'')+'>'+esc(s.title||s.id)+' ('+esc(s.id)+')</option>').join('')+
      '</select></div>';
  }
  if(a.name==='open_url'){
    h+='<div style="margin-top:9px"><span class="mini">URL</span><input class="inp" data-act="url" value="'+esc(a.url||'')+'" placeholder="https://…"></div>';
  }
  if(['navigate','data_exchange','update_data'].includes(a.name)){
    const pl=a.payload||[];
    h+='<div style="margin-top:9px"><span class="mini">Payload (opcional)</span>'+
      pl.map((p,i)=>'<div class="pair-row"><input class="inp" data-payf="key" data-payidx="'+i+'" value="'+esc(p.key||'')+'" placeholder="chave"><input class="inp" data-payf="value" data-payidx="'+i+'" value="'+esc(p.value||'')+'" placeholder="valor / ${form.x}"><button class="x-btn" data-paydel="'+i+'">'+icon('trash',13)+'</button></div>').join('')+
      '<button class="add-btn" data-payadd>'+icon('plus',14)+'Adicionar campo</button></div>';
  }
  return h+'</div>';
}
// Editor de ação simplificado (modo UX): sem payload, telas por título, rótulos amigáveis.
function uxActionEditor(node,f){
  const allowed=f.allowed||['navigate','complete','open_url'];
  let a=node.props[f.key]; if(!a||!a.name) a={name:allowed[0], payload:[]};
  const opts=UX_ACTS.filter(x=>allowed.includes(x)); if(!opts.includes(a.name)) opts.push(a.name);
  const title = f.key==='on-select-action' ? 'Ao escolher uma opção' : 'Ao tocar neste item';
  let h='<div class="opt-card" data-actkey="'+esc(f.key)+'">'+
    '<span class="mini">'+title+'</span><select class="sel" data-act="name">'+
    opts.map(x=>'<option value="'+x+'"'+(a.name===x?' selected':'')+'>'+esc(UX_ACT_LABEL[x]||ACT_LABEL[x]||x)+'</option>').join('')+'</select>';
  if(a.name==='navigate'){
    h+='<div style="margin-top:9px"><span class="mini">Tela de destino</span><select class="sel" data-act="next">'+
      '<option value="">— escolha a tela —</option>'+
      state.flow.screens.map(s=>'<option value="'+esc(s.id)+'"'+(a.next===s.id?' selected':'')+'>'+esc(s.title||s.id)+'</option>').join('')+
      '</select></div>';
  }
  if(a.name==='open_url'){
    h+='<div style="margin-top:9px"><span class="mini">Endereço (URL)</span><input class="inp" data-act="url" value="'+esc(a.url||'')+'" placeholder="https://…"></div>';
  }
  return h+'</div>';
}
function imageEditor(node,key){
  const v=node.props[key];
  return '<div data-imgkey="'+esc(key)+'">'+
    (v?'<div class="wa-img" style="height:120px;margin-bottom:8px"><img src="'+esc(v)+'" style="height:100%;object-fit:contain"></div>':'')+
    '<input type="file" accept="image/*" data-imgfile style="font-size:12px;width:100%;margin-bottom:7px">'+
    '<textarea class="ta mono" data-f="'+key+'" placeholder="data:image/png;base64,…" style="min-height:70px">'+esc(v||'')+'</textarea></div>';
}
function navSummary(sc){
  const outs=[];
  walk(sc.children, n=>{
    ['on-click-action','on-select-action'].forEach(k=>{ const a=n.props&&n.props[k];
      if(a&&a.name==='navigate'&&a.next) outs.push(a.next);
      if(a&&a.name==='complete') outs.push('__complete__'); });
  });
  return outs;
}
function inspScreen(sc){
  const idx=state.flow.screens.indexOf(sc);
  const outs=navSummary(sc);
  const navTargets=[...new Set(outs.filter(x=>x!=='__complete__'))];
  const ux=isUX();
  let html='<div class="insp-hd"><div class="k">Tela '+(idx+1)+' de '+state.flow.screens.length+'</div>'+
    '<div class="n"><span class="ci">'+icon('gear',17)+'</span><div><b>'+esc(sc.title||sc.id)+'</b><div class="type">'+esc(ux?('Tela '+(idx+1)):sc.id)+'</div></div></div>'+
    '<div class="tool-btns">'+
      '<button class="btn sm" data-scr-move="-1"'+(idx===0?' disabled':'')+' title="Mover para a esquerda">'+icon('back',13)+'</button>'+
      '<button class="btn sm" data-scr-dup>'+icon('copy',13)+'Duplicar</button>'+
      '<button class="btn sm" data-scr-move="1"'+(idx===state.flow.screens.length-1?' disabled':'')+' title="Mover para a direita">'+icon('redo',13)+'</button>'+
      '<button class="btn sm" data-scr-del'+(state.flow.screens.length<=1?' disabled':'')+'>'+icon('trash',13)+'</button>'+
    '</div></div>';
  html+='<div class="insp-body">';
  html+='<div class="fld"><label>'+(ux?'Nome da tela':'Título (exibido no topo)')+'</label><input class="inp" data-sf="title" value="'+esc(sc.title||'')+'"></div>';
  if(!ux) html+='<div class="fld"><label>ID da tela <span class="sub">· único, MAIÚSCULAS</span></label><input class="inp" data-sf="id" value="'+esc(sc.id)+'"></div>';
  html+='<div class="switch" data-toggle="screen|terminal"><div class="lb"><b>'+(ux?'É a última tela?':'Tela final (terminal)')+'</b><span>'+(ux?'Finaliza o fluxo quando o usuário concluir':'Última tela do fluxo — usa ação "complete"')+'</span></div>'+tgl(sc.terminal)+'</div>';
  if(!ux) html+='<div class="insp-sec"><div class="sec-t">Modelo de dados (data)</div>'+
    '<div style="font-size:11px;color:var(--text-3);margin:2px 0 7px;line-height:1.4">JSON opcional recebido do servidor. Ex.: <code>{"nome":{"type":"string","__example__":"Ana"}}</code></div>'+
    '<textarea class="ta mono" data-sf="data" placeholder="{}" style="min-height:90px">'+esc(sc.dataText||'')+'</textarea></div>';
  html+='<div class="insp-sec"><div class="sec-t">'+(ux?'Para onde esta tela leva':'Transições desta tela')+'</div>';
  if(navTargets.length) html+=navTargets.map(t=>'<div style="font-size:12.5px;color:var(--accent-deep);font-weight:600;margin-top:6px;display:flex;align-items:center;gap:6px">'+icon('map',14)+'→ '+esc(ux?screenTitleById(t):t)+'</div>').join('');
  else if(outs.includes('__complete__')) html+='<div style="font-size:12.5px;color:#6d28d9;font-weight:600;margin-top:6px">✓ conclui o fluxo</div>';
  else html+='<div style="font-size:12px;color:var(--text-3);margin-top:6px">'+(ux?'Nenhuma ainda. Adicione um Rodapé (botão) e escolha “Ir para outra tela”.':'Nenhuma. Adicione um Rodapé/Link com ação "Navegar".')+'</div>';
  html+='</div></div>';
  return html;
}
function casesManager(node){
  const keys=Object.keys(node.cases);
  return '<div class="insp-sec"><div class="sec-t">Casos do Switch</div>'+
    '<div style="font-size:11px;color:var(--text-3);margin:2px 0 6px">Cada caso corresponde a um valor de <code>'+esc(node.props.value||'value')+'</code>.</div>'+
    keys.map(k=>'<div class="pair-row"><input class="inp" data-caserename="'+encodeURIComponent(k)+'" value="'+esc(k)+'"><button class="x-btn" data-casedel="'+encodeURIComponent(k)+'"'+(keys.length<=1?' disabled':'')+'>'+icon('trash',13)+'</button></div>').join('')+
    '<button class="add-btn" data-caseadd>'+icon('plus',15)+'Adicionar caso</button></div>';
}
function inspComponent(node){
  const def=COMPONENTS[node.type];
  let html='<div class="insp-hd"><div class="k">Componente</div>'+
    '<div class="n"><span class="ci">'+icon(def.icon,17)+'</span><div><b>'+esc(def.label)+'</b><div class="type">'+node.type+'</div></div></div>'+
    '<div class="tool-btns"><button class="btn sm" data-dup="'+node._id+'">'+icon('copy',13)+'Duplicar</button>'+
    '<button class="btn sm" data-del="'+node._id+'">'+icon('trash',13)+'Excluir</button></div></div>';
  html+='<div class="insp-body">';
  if(isUX() && (node.type==='If'||node.type==='Switch')){
    html+='<div class="note">Este é um bloco <b>avançado</b> ('+(node.type==='If'?'condição':'seleção por valor')+'). Para editar a lógica de ramificação, use o modo <b>Dev</b>. Aqui você ainda pode excluí-lo pelo botão acima.</div>';
    html+='</div>'; return html;
  }
  for(const f of def.fields) html+=renderField(node,f);
  if(!isUX() && node.type==='If') html+='<div class="note">As ramificações <b>então</b> e <b>senão</b> são editadas arrastando componentes para dentro delas no telefone. Para transições condicionais, coloque um <b>Rodapé</b> (ação Navegar) em cada ramo.</div>';
  if(!isUX() && node.type==='Switch') html+=casesManager(node);
  html+='</div>';
  return html;
}
function inspPlay(){
  const sc=currentScreen();
  return '<div class="insp-hd"><div class="k">Modo teste</div>'+
    '<div class="n"><span class="ci">'+icon('flag',17)+'</span><div><b>Testando o fluxo</b><div class="type">'+esc(sc.title||sc.id)+'</div></div></div></div>'+
    '<div class="insp-play"><p>Preencha os <b>campos</b>, selecione <b>opções</b> e toque nos <b>botões</b> para navegar entre as telas — como o usuário faria no WhatsApp. As respostas ficam guardadas até reiniciar, e ramificações (If/Switch) reagem ao que foi preenchido.</p>'+
    '<div class="tool-btns"><button class="btn sm" data-back'+(!state.navStack.length?' disabled':'')+'>'+icon('back',13)+'Voltar</button>'+
    '<button class="btn sm" data-restart>'+icon('redo',13)+'Reiniciar</button></div></div>';
}
function renderInspector(){
  const box=$('#inspector');
  if(isPlaying()){ box.innerHTML=inspPlay(); return; }
  if(state.sel.kind==='component'){
    const node=findNode(state.sel.id);
    if(node){ box.innerHTML=inspComponent(node); return; }
    state.sel={kind:'screen'};
  }
  box.innerHTML=inspScreen(currentScreen());
}

/* ============================ SERIALIZAÇÃO ============================ */
let usesDX=false;
function coerce(v){ if(v==='true')return true; if(v==='false')return false;
  if(typeof v==='string' && v!=='' && !/^\$\{/.test(v) && /^-?\d+(\.\d+)?$/.test(v)) return Number(v); return v; }
function payObj(pl){ const o={}; (pl||[]).forEach(p=>{ if(p&&p.key) o[p.key]=coerce(p.value); }); return o; }
function serializeAction(a){
  if(!a||!a.name||a.name==='none') return null;
  if(a.name==='navigate') return {name:'navigate', next:{type:'screen', name:a.next||''}, payload:payObj(a.payload)};
  if(a.name==='open_url'){ const o={name:'open_url', url:a.url||''}; return o; }
  return {name:a.name, payload:payObj(a.payload)};
}
function cleanOption(o){ const r={id:o.id||'', title:o.title||''};
  if(o.description) r.description=o.description; if(o.metadata) r.metadata=o.metadata; if(o.enabled===false) r.enabled=false; return r; }
function serializeNode(node){
  const def=COMPONENTS[node.type]; if(!def) return {type:node.type};
  const out={type:node.type};
  for(const f of def.fields){
    const v=node.props[f.key];
    if(f.type==='boolean'){ const dv=!!f.def, cur=(v===undefined?dv:!!v); if(cur!==dv) out[f.key]=cur; continue; }
    if(f.type==='options'){ if(v&&v.length) out[f.key]=v.map(cleanOption); continue; }
    if(f.type==='action'){ const sa=serializeAction(v); if(sa){ out[f.key]=sa; if(sa.name==='data_exchange') usesDX=true; } continue; }
    if(f.type==='lines'){ let arr=Array.isArray(v)?v.slice():String(v||'').split('\n'); if(arr.some(x=>String(x).trim()!=='')) out[f.key]=arr; continue; }
    if(f.type==='number'){ if(v!==''&&v!=null&&!isNaN(v)) out[f.key]=Number(v); continue; }
    if(f.type==='select'){ if(v!=null&&v!==f.def&&v!=='') out[f.key]=v; continue; }
    if(f.type==='condition'){ if(v) out[f.key]=v; continue; }
    if(v!=null&&v!=='') out[f.key]=v;
  }
  if(node.type==='If'){ out.then=(node.then||[]).map(serializeNode); if(node.else&&node.else.length) out.else=node.else.map(serializeNode); }
  if(node.type==='Switch'){ out.cases={}; Object.keys(node.cases||{}).forEach(k=>{ out.cases[k]=node.cases[k].map(serializeNode); }); }
  return out;
}
function serializeScreen(sc){
  const out={id:sc.id, title:sc.title||sc.id};
  if(sc.terminal){ out.terminal=true; out.success=true; }
  let data={}; if(sc.dataText&&sc.dataText.trim()){ try{ data=JSON.parse(sc.dataText); }catch(e){ data={}; } }
  out.data=data;
  out.layout={type:'SingleColumnLayout', children:(sc.children||[]).map(serializeNode)};
  return out;
}
function buildFlowJSON(){
  usesDX=false;
  const screens=state.flow.screens.map(serializeScreen);
  const flow={version:state.flow.version};
  if(usesDX) flow.data_api_version='3.0';
  flow.screens=screens;
  return flow;
}

/* ============================ IMPORTAÇÃO ============================ */
function parseAction(v){ if(!v) return {name:'none', payload:[]};
  const a={name:v.name}; if(v.name==='navigate') a.next=(v.next&&v.next.name)||''; if(v.name==='open_url') a.url=v.url||'';
  a.payload = v.payload ? Object.keys(v.payload).map(k=>({key:k, value:String(v.payload[k])})) : []; return a; }
function importNodes(arr){ return (arr||[]).flatMap(importNode); }
function importNode(c){
  if(!c||!c.type) return [];
  if(c.type==='Form') return importNodes(c.children||[]);
  const def=COMPONENTS[c.type]; if(!def) return [];
  const node={_id:uid(), type:c.type, props:{}};
  for(const f of def.fields){ if(!(f.key in c)) continue; const v=c[f.key];
    if(f.type==='action') node.props[f.key]=parseAction(v);
    else if(f.type==='lines') node.props[f.key]=Array.isArray(v)?v:String(v).split('\n');
    else if(f.type==='options') node.props[f.key]=Array.isArray(v)?v.map(o=>({id:o.id,title:o.title,description:o.description,metadata:o.metadata,enabled:o.enabled})):[];
    else node.props[f.key]=v;
  }
  if(c.type==='If'){ node.props.condition=c.condition||''; node.then=importNodes(c.then); node.else=importNodes(c.else); }
  if(c.type==='Switch'){ node.props.value=c.value||''; node.cases={}; Object.keys(c.cases||{}).forEach(k=>{ node.cases[k]=importNodes(c.cases[k]); }); if(!Object.keys(node.cases).length) node.cases={caso_1:[]}; }
  return [node];
}
function importFlow(obj){
  const screens=(obj.screens||[]).map(s=>({ _id:uid(), id:s.id||'TELA', title:s.title||s.id||'Tela', terminal:!!s.terminal,
    dataText:(s.data&&Object.keys(s.data).length)?JSON.stringify(s.data,null,2):'',
    children: importNodes((s.layout&&s.layout.children)||s.children||[]) }));
  if(!screens.length) throw new Error('Nenhuma tela encontrada');
  state.flow={version:obj.version||'7.0', screens};
  state.currentId=screens[0]._id; state.sel={kind:'screen'};
}

/* ============================ VALIDAÇÃO ============================ */
function validateFlow(){
  const out=[]; const push=(level,title,msg,loc)=>out.push({level,title,msg,loc});
  const idset=new Set(state.flow.screens.map(s=>s.id)); const seenIds={};
  if(!state.flow.screens.some(s=>s.terminal)) push('warn','Sem tela final','Nenhuma tela marcada como terminal — o fluxo pode não concluir.');
  state.flow.screens.forEach(sc=>{
    seenIds[sc.id]=(seenIds[sc.id]||0)+1;
    if(!/^[A-Za-z_][A-Za-z0-9_]*$/.test(sc.id)) push('warn','ID de tela incomum','Use letras maiúsculas/underscore, sem espaços.',sc.id);
    if(!sc.children.length) push('err','Tela vazia','Adicione ao menos um componente.',sc.id);
    const topFooters=sc.children.filter(n=>n.type==='Footer').length;
    if(topFooters>1) push('err','Vários rodapés','Só é permitido 1 Footer por tela.',sc.id);
    walk(sc.children,n=>{
      if(n.type==='If'){
        const tf=(n.then||[]).some(x=>x.type==='Footer'), ef=(n.else||[]).some(x=>x.type==='Footer');
        if(tf!==ef) push('err','Footer em apenas um ramo do If','Se houver Footer em "então", também deve haver em "senão" (e vice-versa).',sc.id);
        if((tf||ef)&&topFooters) push('err','Footer dentro e fora do If','Não misture Footer dentro do If com Footer no nível da tela.',sc.id);
        if(!/\$\{(form|data|screen)\./.test(n.props.condition||'')) push('warn','Condição sem variável','A condição do If deve conter ${form...} ou ${data...}.',sc.id);
      }
      if(n.type==='Switch' && !Object.keys(n.cases||{}).length) push('err','Switch sem casos','Adicione ao menos um caso.',sc.id);
      ['on-click-action','on-select-action'].forEach(k=>{ const a=n.props&&n.props[k];
        if(a&&a.name==='navigate'){ if(!a.next) push('warn','Navegação sem destino','Defina a tela de destino.',sc.id);
          else if(!idset.has(a.next)) push('err','Navega para tela inexistente','Destino "'+a.next+'" não existe.',sc.id); } });
      const def=COMPONENTS[n.type]; if(def) def.fields.forEach(f=>{ if(f.max && typeof n.props[f.key]==='string' && n.props[f.key].length>f.max)
        push('warn','Limite de caracteres','"'+f.label+'" em '+n.type+' passou de '+f.max+'.',sc.id); });
    });
    const names={};
    walk(sc.children,n=>{ if(['TextInput','TextArea','CheckboxGroup','RadioButtonsGroup','Dropdown','DatePicker','CalendarPicker','OptIn'].includes(n.type)){
      if(!n.props.name) push('warn','Campo sem "name"','Componente '+n.type+' precisa de um name.',sc.id);
      else names[n.props.name]=(names[n.props.name]||0)+1; } });
    Object.keys(names).forEach(nm=>{ if(names[nm]>1) push('err','Nome duplicado','O name "'+nm+'" aparece '+names[nm]+'x nesta tela.',sc.id); });
    if(sc.terminal){ let hc=false; walk(sc.children,n=>{ const a=n.props&&n.props['on-click-action']; if(a&&a.name==='complete')hc=true; });
      if(!hc) push('warn','Tela final sem "complete"','Adicione um Footer com ação Concluir.',sc.id); }
  });
  Object.keys(seenIds).forEach(id=>{ if(seenIds[id]>1) push('err','ID de tela duplicado','"'+id+'" é usado '+seenIds[id]+'x.',id); });
  return out;
}

/* ============================ AÇÕES DE MODELO ============================ */
function uniqueScreenId(base){ base=String(base||'TELA').toUpperCase().replace(/[^A-Z0-9_]/g,'_').replace(/^_+|_+$/g,'')||'TELA';
  let id=base,n=2; while(state.flow.screens.some(s=>s.id===id)) id=base+'_'+(n++); return id; }
function reid(n){ n._id=uid(); childArrays(n).forEach(a=>a.forEach(reid)); }
function cloneFresh(n){ const c=clone(n); reid(c); return c; }
// Garante um "name" único na tela atual (evita erro de nome duplicado ao adicionar).
function ensureUniqueName(node){ if(!node||!node.props||!('name' in node.props)) return;
  const names=new Set(); walk(currentScreen().children,n=>{ if(n!==node&&n.props&&n.props.name) names.add(n.props.name); });
  let nm=node.props.name; if(nm&&!names.has(nm)) return;
  const base=String(nm||node.type.toLowerCase()).replace(/_\d+$/,''); let i=2,c;
  do{ c=base+'_'+(i++); }while(names.has(c)); node.props.name=c; }
function addComponent(type){ commit(()=>{ const n=makeNode(type); ensureUniqueName(n); currentScreen().children.push(n); state.sel={kind:'component',id:n._id}; state.justAdded=n._id; }); toast(COMPONENTS[type].label+' adicionado'); }
function addScreen(){ commit(()=>{ const id=uniqueScreenId('TELA'); const s={_id:uid(),id,title:'Nova tela',terminal:false,dataText:'',children:[]};
  state.flow.screens.push(s); state.currentId=s._id; state.sel={kind:'screen'}; }); toast('Tela adicionada'); }
function deleteNode(id){ commit(()=>{ const r=findWithParent(id); if(r) r.arr.splice(r.index,1); if(state.sel.kind==='component'&&state.sel.id===id) state.sel={kind:'screen'}; }); }
function duplicateNode(id){ commit(()=>{ const r=findWithParent(id); if(r){ const c=cloneFresh(r.node); r.arr.splice(r.index+1,0,c); state.sel={kind:'component',id:c._id}; } }); }
function duplicateScreen(){ commit(()=>{ const sc=currentScreen(); const idx=state.flow.screens.indexOf(sc); const c=clone(sc);
  c._id=uid(); c.id=uniqueScreenId(sc.id+'_COPY'); c.title=(sc.title||sc.id)+' (cópia)'; c.children.forEach(reid);
  state.flow.screens.splice(idx+1,0,c); state.currentId=c._id; state.sel={kind:'screen'}; }); toast('Tela duplicada'); }
function deleteScreen(){ if(state.flow.screens.length<=1){ toast('É preciso ao menos uma tela','warn'); return; }
  commit(()=>{ const idx=state.flow.screens.indexOf(currentScreen()); state.flow.screens.splice(idx,1);
  state.currentId=state.flow.screens[Math.max(0,idx-1)]._id; state.sel={kind:'screen'}; }); }
function moveScreen(dir){ const idx=state.flow.screens.indexOf(currentScreen()); const t=idx+dir; if(t<0||t>=state.flow.screens.length) return;
  commit(()=>{ const arr=state.flow.screens; const [s]=arr.splice(idx,1); arr.splice(t,0,s); }); }
function setScreenId(sc,raw){ let id=String(raw||'').trim().replace(/\s+/g,'_'); if(!id){ toast('ID vazio','warn'); return; }
  if(state.flow.screens.some(s=>s!==sc&&s.id===id)){ id=uniqueScreenId(id); toast('ID já existia — ajustado para '+id,'warn'); }
  const old=sc.id; sc.id=id;
  state.flow.screens.forEach(s=>walk(s.children,n=>{ ['on-click-action','on-select-action'].forEach(k=>{ const a=n.props&&n.props[k]; if(a&&a.name==='navigate'&&a.next===old) a.next=id; }); }));
}

/* ============================ DRAG & DROP ============================ */
let dragKind=null, dragType=null, dragId=null, draggedEl=null, placeholderEl=null;
function ensurePH(){ if(!placeholderEl){ placeholderEl=document.createElement('div'); placeholderEl.className='placeholder'; } }
function removePH(){ if(placeholderEl&&placeholderEl.parentElement) placeholderEl.parentElement.removeChild(placeholderEl); }
function clearDnd(){ removePH(); if(draggedEl) draggedEl.classList.remove('dragging'); dragKind=dragType=dragId=null; draggedEl=null; }
function showPH(e){
  const dz=e.target.closest('.dropzone'); if(!dz){ removePH(); return; }
  if(dragKind==='move'&&draggedEl&&draggedEl.contains(dz)){ removePH(); return; }
  const items=[...dz.querySelectorAll(':scope > .cnode')]; let before=null;
  for(const it of items){ if(it===draggedEl) continue; const r=it.getBoundingClientRect(); if(e.clientY<r.top+r.height/2){ before=it; break; } }
  ensurePH(); if(before) dz.insertBefore(placeholderEl,before); else dz.appendChild(placeholderEl);
}
function doDrop(){
  const dz=placeholderEl&&placeholderEl.parentElement; if(!dz){ clearDnd(); return; }
  const arr=getArrayByKey(dz.dataset.key); if(!arr){ clearDnd(); return; }
  let index=0; for(const ch of dz.children){ if(ch===placeholderEl) break; if(ch.classList&&ch.classList.contains('cnode')&&ch!==draggedEl) index++; }
  const kind=dragKind, type=dragType, id=dragId;
  commit(()=>{
    if(kind==='new'){ const n=makeNode(type); ensureUniqueName(n); arr.splice(index,0,n); state.sel={kind:'component',id:n._id}; state.justAdded=n._id; }
    else { const src=findWithParent(id); if(!src) return; const [node]=src.arr.splice(src.index,1); arr.splice(index,0,node); state.sel={kind:'component',id:node._id}; }
  });
  clearDnd();
}

/* ============================ EVENTOS ============================ */
function firstEditRecord(){ if(armed){ recordUndo(); armed=false; } }
function setCompField(node,t){ const key=t.dataset.f;
  if(t.dataset.lines) node.props[key]=t.value.split('\n');
  else if(t.type==='number') node.props[key]=(t.value===''?'':Number(t.value));
  else { let val=t.value; if(t.maxLength>0 && val.length>t.maxLength) val=val.slice(0,t.maxLength); node.props[key]=val; } }

function initEvents(){
  $('#btnUndo').onclick=undo; $('#btnRedo').onclick=redo;
  $('#verSel').onchange=e=>commit(()=>state.flow.version=e.target.value);
  $('#btnExport').onclick=openExport; $('#btnImport').onclick=openImport;
  $('#btnValidate').onclick=openValidate; $('#btnMap').onclick=openMap; $('#btnTheme').onclick=toggleTheme;
  $('#modeDev').onclick=()=>setMode('dev'); $('#modeUx').onclick=()=>setMode('ux');
  $('#waBack').addEventListener('click',()=>{ if(isPlaying()) playBack(); });
  $('#backdrop').addEventListener('click',e=>{ if(e.target===$('#backdrop')) closeModal(); });
  $('#modal').addEventListener('click',e=>{ if(e.target.closest('[data-close]')) closeModal(); });

  // Tabs
  $('#tabs').addEventListener('click',e=>{ if(e.target.closest('[data-addscreen]')){ addScreen(); return; }
    const t=e.target.closest('[data-tab]'); if(t){ state.currentId=t.dataset.tab; state.sel={kind:'screen'}; render(); } });

  // Palette
  $('#palette').addEventListener('click',e=>{ const it=e.target.closest('[data-add]'); if(it) addComponent(it.dataset.add); });
  $('#palette').addEventListener('dragstart',e=>{ const it=e.target.closest('[data-add]'); if(!it) return;
    dragKind='new'; dragType=it.dataset.add; dragId=null; draggedEl=null; try{e.dataTransfer.setData('text/plain','new');e.dataTransfer.effectAllowed='copy';}catch(_){} });

  // Canvas
  const root=$('#canvasRoot');
  root.addEventListener('click',e=>{
    if(isPlaying()){ handlePlayClick(e); return; }
    const del=e.target.closest('[data-del]'); if(del){ e.stopPropagation(); deleteNode(del.dataset.del); return; }
    const dup=e.target.closest('[data-dup]'); if(dup){ e.stopPropagation(); duplicateNode(dup.dataset.dup); return; }
    if(e.target.closest('[data-grip]')) return;
    const nd=e.target.closest('[data-node]'); if(nd){ state.sel={kind:'component',id:nd.dataset.node}; renderCanvas(); renderInspector(); return; }
    state.sel={kind:'screen'}; renderCanvas(); renderInspector();
  });
  root.addEventListener('dragstart',e=>{ if(isPlaying()){ e.preventDefault(); return; } const nd=e.target.closest('[data-node]'); if(!nd) return; e.stopPropagation();
    dragKind='move'; dragId=nd.dataset.node; dragType=null; draggedEl=nd; setTimeout(()=>nd.classList.add('dragging'),0);
    try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain','move');}catch(_){} });
  root.addEventListener('dragend',()=>clearDnd());
  root.addEventListener('dragover',e=>{ if(!dragKind) return; e.preventDefault(); try{e.dataTransfer.dropEffect=dragKind==='new'?'copy':'move';}catch(_){} showPH(e); });
  root.addEventListener('drop',e=>{ if(!dragKind) return; e.preventDefault(); e.stopPropagation(); doDrop(); });

  // Modo Testar: campos dinâmicos (digitação, seleção, reavaliação de ramificações)
  root.addEventListener('input',e=>{ if(!isPlaying()) return; const el=e.target; const nid=el.dataset&&el.dataset.pinput; if(!nid) return;
    if(el.dataset.pfield){ const o=Object.assign({},state.playData[nid]); o[el.dataset.pfield]=el.value; state.playData[nid]=o; }
    else state.playData[nid]=el.value;
    if(state.playErr[nid]){ delete state.playErr[nid]; const cn=el.closest('.cnode');
      if(cn){ cn.classList.remove('perr'); const em=cn.querySelector('.wa-err'); if(em) em.remove(); } } });
  root.addEventListener('change',e=>{ if(!isPlaying()) return; const el=e.target;
    if(el.dataset&&el.dataset.pselect){ state.playData[el.dataset.pselect]=el.value; delete state.playErr[el.dataset.pselect]; renderCanvas(); } });
  root.addEventListener('focusout',e=>{ if(!isPlaying()||state.done) return; const el=e.target;
    if(el.dataset&&(el.dataset.pinput||el.dataset.pselect) && playSigNow()!==state.playSig) renderCanvas(); });

  // Inspector
  const insp=$('#inspector');
  insp.addEventListener('focusin',e=>{ const t=e.target; if(t.tagName==='TEXTAREA'||(t.tagName==='INPUT'&&t.type!=='file')) armed=true; });
  insp.addEventListener('input',e=>{
    const t=e.target; const node=(state.sel.kind==='component')?findNode(state.sel.id):null;
    if(t.dataset.f!==undefined){ if(t.tagName==='SELECT') return; if(!node) return; firstEditRecord(); setCompField(node,t); renderCanvas(); saveLocal(); return; }
    if(t.dataset.optf!==undefined && node){ firstEditRecord(); const key=t.closest('[data-optkey]').dataset.optkey; let val=t.value; if(t.maxLength>0 && val.length>t.maxLength) val=val.slice(0,t.maxLength); node.props[key][+t.dataset.optidx][t.dataset.optf]=val; renderCanvas(); saveLocal(); return; }
    if(t.dataset.payf!==undefined && node){ firstEditRecord(); const fk=t.closest('[data-actkey]').dataset.actkey; (node.props[fk].payload=node.props[fk].payload||[])[+t.dataset.payidx][t.dataset.payf]=t.value; saveLocal(); return; }
    if(t.dataset.act==='url' && node){ firstEditRecord(); node.props[t.closest('[data-actkey]').dataset.actkey].url=t.value; renderCanvas(); saveLocal(); return; }
    if(t.dataset.sf==='title'){ firstEditRecord(); currentScreen().title=t.value; renderTabs(); $('#waTitle').textContent=t.value||currentScreen().id; saveLocal(); return; }
    if(t.dataset.sf==='data'){ firstEditRecord(); currentScreen().dataText=t.value; saveLocal(); return; }
  });
  insp.addEventListener('change',e=>{
    const t=e.target; const node=(state.sel.kind==='component')?findNode(state.sel.id):null;
    if(t.dataset.f!==undefined && t.tagName==='SELECT' && node){ commit(()=>node.props[t.dataset.f]=t.value); return; }
    if(t.dataset.act==='name' && node){ const fk=t.closest('[data-actkey]').dataset.actkey;
      commit(()=>{ const old=node.props[fk]||{}; const na={name:t.value, payload:old.payload||[]}; if(t.value==='navigate')na.next=old.next||''; if(t.value==='open_url')na.url=old.url||''; node.props[fk]=na; }); return; }
    if(t.dataset.act==='next' && node){ const fk=t.closest('[data-actkey]').dataset.actkey; commit(()=>node.props[fk].next=t.value); return; }
    if(t.dataset.caserename!==undefined && node){ const oldk=decodeURIComponent(t.dataset.caserename); const nk=(t.value||'').trim()||oldk;
      if(nk!==oldk && !node.cases[nk]) commit(()=>{ const nc={}; Object.keys(node.cases).forEach(k=>nc[k===oldk?nk:k]=node.cases[k]); node.cases=nc; }); else renderInspector(); return; }
    if(t.dataset.imgfile!==undefined && node){ const file=t.files&&t.files[0]; if(file){ const rd=new FileReader(); rd.onload=()=>commit(()=>node.props[t.closest('[data-imgkey]').dataset.imgkey]=rd.result); rd.readAsDataURL(file); } return; }
    if(t.dataset.sf==='id'){ commit(()=>setScreenId(currentScreen(),t.value)); return; }
  });
  insp.addEventListener('click',e=>{
    const t=e.target;
    if(t.closest('[data-restart]')){ playRestart(); return; }
    if(t.closest('[data-back]')){ playBack(); return; }
    const node=(state.sel.kind==='component')?findNode(state.sel.id):null;
    const del=t.closest('[data-del]'); if(del){ deleteNode(del.dataset.del); return; }
    const dup=t.closest('[data-dup]'); if(dup){ duplicateNode(dup.dataset.dup); return; }
    const ins=t.closest('[data-insert]'); if(ins){ insertCond(ins.dataset.insert); return; }
    const tog=t.closest('[data-toggle]'); if(tog){ handleToggle(tog.dataset.toggle); return; }
    if(node){
      const oa=t.closest('[data-optadd]'); if(oa){ const key=oa.closest('[data-optkey]').dataset.optkey; commit(()=>node.props[key].push({id:'op_'+(node.props[key].length+1),title:'Nova opção'})); return; }
      const od=t.closest('[data-optdel]'); if(od){ const key=od.closest('[data-optkey]').dataset.optkey; commit(()=>node.props[key].splice(+od.dataset.optdel,1)); return; }
      const pa=t.closest('[data-payadd]'); if(pa){ const fk=pa.closest('[data-actkey]').dataset.actkey; commit(()=>{ (node.props[fk].payload=node.props[fk].payload||[]).push({key:'',value:''}); }); return; }
      const pd=t.closest('[data-paydel]'); if(pd){ const fk=pd.closest('[data-actkey]').dataset.actkey; commit(()=>node.props[fk].payload.splice(+pd.dataset.paydel,1)); return; }
      const ca=t.closest('[data-caseadd]'); if(ca){ commit(()=>{ let n=1; while(node.cases['caso_'+n])n++; node.cases['caso_'+n]=[]; }); return; }
      const cd=t.closest('[data-casedel]'); if(cd){ commit(()=>delete node.cases[decodeURIComponent(cd.dataset.casedel)]); return; }
    }
    if(t.closest('[data-scr-dup]')){ duplicateScreen(); return; }
    if(t.closest('[data-scr-del]')){ deleteScreen(); return; }
    const mv=t.closest('[data-scr-move]'); if(mv){ moveScreen(+mv.dataset.scrMove); return; }
  });

  document.addEventListener('keydown',onKey);
  document.addEventListener('dragend',clearDnd); // limpa arrastos abortados (ex.: da paleta)
  window.addEventListener('resize',()=>{ if($('#backdrop').classList.contains('open')&&$('#mapSvg')) drawMap(); });
}
function handleToggle(spec){ const [scope,key]=spec.split('|');
  if(scope==='comp'){ const node=findNode(state.sel.id); if(!node) return; const f=COMPONENTS[node.type].fields.find(x=>x.key===key);
    const cur=(node.props[key]===undefined?!!f.def:!!node.props[key]); commit(()=>node.props[key]=!cur); }
  else if(scope==='screen'&&key==='terminal'){ commit(()=>currentScreen().terminal=!currentScreen().terminal); } }
function insertCond(text){ const ta=$('#condTA'); if(!ta) return; const node=findNode(state.sel.id);
  const s=ta.selectionStart, en=ta.selectionEnd, val=ta.value, nv=val.slice(0,s)+text+val.slice(en);
  recordUndo(); if(node) node.props.condition=nv; ta.value=nv; ta.focus(); ta.selectionStart=ta.selectionEnd=s+text.length; renderCanvas(); saveLocal(); }
function onKey(e){
  if(e.key==='Escape'){ closeModal(); return; }
  const mod=e.ctrlKey||e.metaKey;
  if(mod && e.key.toLowerCase()==='z' && !e.shiftKey){ e.preventDefault(); undo(); return; }
  if(mod && (e.key.toLowerCase()==='y'||(e.shiftKey&&e.key.toLowerCase()==='z'))){ e.preventDefault(); redo(); return; }
  const tag=(document.activeElement&&document.activeElement.tagName)||'';
  if((e.key==='Delete') && state.sel.kind==='component' && !['INPUT','TEXTAREA','SELECT'].includes(tag)){ e.preventDefault(); deleteNode(state.sel.id); }
}

/* ============================ MODAIS ============================ */
function openModal(html,cls){ $('#modal').className='modal'+(cls?' '+cls:''); $('#modal').innerHTML=html; $('#backdrop').classList.add('open'); }
function closeModal(){ $('#backdrop').classList.remove('open'); }
function escMin(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function jsonHi(str){ return escMin(str).replace(/("(?:\\.|[^"\\])*")(\s*:)?|\b(true|false|null)\b|(-?\d+(?:\.\d+)?)/g,(m,s1,colon,bool,num)=>{
  if(s1) return '<span class="'+(colon?'k':'s')+'">'+s1+'</span>'+(colon||''); if(bool) return '<span class="b">'+bool+'</span>'; if(num) return '<span class="n">'+num+'</span>'; return m; }); }
function copyText(str){ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(str).then(()=>toast('Copiado!')).catch(()=>fbCopy(str)); } else fbCopy(str); }
function fbCopy(str){ try{ const ta=document.createElement('textarea'); ta.value=str; ta.style.cssText='position:fixed;opacity:0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); toast('Copiado!'); }catch(e){ toast('Copie manualmente','warn'); } }
function downloadJSON(str,name){ try{ const b=new Blob([str],{type:'application/json'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),800); toast('Download iniciado'); }catch(e){ toast('Não foi possível baixar — use Copiar','warn'); } }
function openExport(){
  let tab='full';
  const build=()=>{ const obj=tab==='full'?buildFlowJSON():serializeScreen(currentScreen()); const str=JSON.stringify(obj,null,2); const c=$('#expCode'); c.innerHTML=jsonHi(str); c.dataset.raw=str; };
  openModal('<div class="modal-hd"><span class="mi">'+icon('export',18)+'</span><div class="mt"><b>Exportar Flow JSON</b><span>Pronto para colar no WhatsApp Flows Playground</span></div><button class="btn icon ghost" data-close>'+icon('close',18)+'</button></div>'+
    '<div class="modal-body"><div style="margin-bottom:12px"><div class="seg"><button id="expFull" class="on">Fluxo completo · '+state.flow.screens.length+' telas</button><button id="expOne">Somente tela atual</button></div></div>'+
    '<pre class="code" id="expCode"></pre></div>'+
    '<div class="modal-foot"><button class="btn" id="expDown">'+icon('import',15)+'Baixar .json</button><button class="btn primary" id="expCopy">'+icon('copy',15)+'Copiar JSON</button></div>');
  build();
  $('#expFull').onclick=()=>{ tab='full'; $('#expFull').classList.add('on'); $('#expOne').classList.remove('on'); build(); };
  $('#expOne').onclick=()=>{ tab='one'; $('#expOne').classList.add('on'); $('#expFull').classList.remove('on'); build(); };
  $('#expCopy').onclick=()=>copyText($('#expCode').dataset.raw);
  $('#expDown').onclick=()=>downloadJSON($('#expCode').dataset.raw,(tab==='full'?'flow':currentScreen().id)+'.json');
}
function openImport(){
  openModal('<div class="modal-hd"><span class="mi">'+icon('import',18)+'</span><div class="mt"><b>Importar Flow JSON</b><span>Cole um JSON existente para editá-lo visualmente</span></div><button class="btn icon ghost" data-close>'+icon('close',18)+'</button></div>'+
    '<div class="modal-body"><textarea class="import-ta" id="impTA" placeholder=\'{ "version": "7.0", "screens": [ ... ] }\'></textarea></div>'+
    '<div class="modal-foot"><button class="btn" data-close>Cancelar</button><button class="btn primary" id="impDo">'+icon('import',15)+'Carregar fluxo</button></div>');

function openValidate(){
  const issues=validateFlow(); const errs=issues.filter(i=>i.level==='err').length, warns=issues.filter(i=>i.level==='warn').length;
  let body;
  if(!issues.length) body='<div class="vitem ok"><span class="vic">'+icon('check',15)+'</span><div class="vt"><b>Tudo certo!</b><span>Nenhum problema encontrado — seu fluxo está pronto para exportar.</span></div></div>';
  else body='<div class="vlist">'+issues.map(i=>'<div class="vitem '+i.level+'"><span class="vic">'+icon(i.level==='err'?'warn':'info',15)+'</span><div class="vt"><b>'+esc(i.title)+'</b><span>'+esc(i.msg)+'</span>'+(i.loc?'<span class="vloc">tela: '+esc(i.loc)+'</span>':'')+'</div></div>').join('')+'</div>';
  openModal('<div class="modal-hd"><span class="mi">'+icon('check',18)+'</span><div class="mt"><b>Validação do fluxo</b><span>'+errs+' erro(s) · '+warns+' aviso(s)</span></div><button class="btn icon ghost" data-close>'+icon('close',18)+'</button></div><div class="modal-body">'+body+'</div><div class="modal-foot"><button class="btn primary" data-close>Fechar</button></div>');
}
function openMap(){
  const scr=state.flow.screens;
  const cards=scr.map((s,i)=>{ const outs=[]; walk(s.children,n=>{['on-click-action','on-select-action'].forEach(k=>{const a=n.props&&n.props[k]; if(a&&a.name==='navigate'&&a.next)outs.push(a.next); if(a&&a.name==='complete')outs.push('__c');});});
    const nav=[...new Set(outs.filter(x=>x!=='__c'))];
    const rows=nav.map(t=>'<div class="mrow nav">'+icon('map',13)+' → '+esc(t)+'</div>').join('')+(outs.includes('__c')?'<div class="mrow done">'+icon('flag',13)+' conclui o fluxo</div>':'')+((!nav.length&&!outs.includes('__c'))?'<div class="mrow">sem saída definida</div>':'');
    const cls='mcard'+(i===0?' start':'')+(s.terminal?' term':'');
    const badge=(i===0?'<span class="map-badge">INÍCIO</span>':'')+(s.terminal?'<span class="map-badge">FINAL</span>':'');
    return '<div class="'+cls+'" data-screen="'+esc(s.id)+'" data-goto="'+s._id+'"><div class="mc-hd"><span>'+esc(s.title||s.id)+'</span>'+badge+'</div><div class="mc-id">'+esc(s.id)+'</div><div class="mc-body">'+rows+'</div></div>';
  }).join('');
  openModal('<div class="modal-hd"><span class="mi">'+icon('map',18)+'</span><div class="mt"><b>Mapa de fluxo</b><span>Telas e transições — clique numa tela para editá-la</span></div><button class="btn icon ghost" data-close>'+icon('close',18)+'</button></div>'+
    '<div class="modal-body"><div class="map-legend"><span><i style="border-color:var(--accent)"></i>navegação (navigate)</span><span><i style="border-color:#6d28d9"></i>conclusão (complete)</span><span>'+scr.length+' telas</span></div>'+
    '<div class="map-wrap"><div class="map-grid" id="mapGrid"><svg class="map-svg" id="mapSvg"></svg>'+cards+'</div></div></div>'+
    '<div class="modal-foot"><button class="btn primary" data-close>Fechar</button></div>','wide');
  $('#mapGrid').addEventListener('click',e=>{ const c=e.target.closest('[data-goto]'); if(c){ state.currentId=c.dataset.goto; state.sel={kind:'screen'}; render(); closeModal(); } });
  requestAnimationFrame(drawMap);
}
function drawMap(){
  const svg=$('#mapSvg'), grid=$('#mapGrid'); if(!svg||!grid) return;
  const gr=grid.getBoundingClientRect(); svg.setAttribute('width',grid.scrollWidth); svg.setAttribute('height',grid.scrollHeight);
  const pos={}; $$('#mapGrid [data-screen]').forEach(el=>{ const r=el.getBoundingClientRect(); pos[el.dataset.screen]={x:r.left-gr.left,y:r.top-gr.top,w:r.width,h:r.height}; });
  const edges=[], seen=new Set();
  state.flow.screens.forEach(s=>{ const outs=new Set(); walk(s.children,n=>{['on-click-action','on-select-action'].forEach(k=>{const a=n.props&&n.props[k]; if(a&&a.name==='navigate'&&a.next)outs.add(a.next);});});
    outs.forEach(t=>{ const key=s.id+'>'+t; if(!seen.has(key)&&pos[t]&&pos[s.id]){ seen.add(key); edges.push([s.id,t]); } }); });
  let paths='<defs><marker id="arw" markerWidth="10" markerHeight="10" refX="7.5" refY="4.5" orient="auto"><path d="M1 1 L7.5 4.5 L1 8" fill="none" stroke="var(--accent)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>';
  edges.forEach(([from,to])=>{ const a=pos[from], b=pos[to]; if(!a||!b) return; let sx,sy,tx,ty,c1x,c1y,c2x,c2y;
    const sameRow=Math.abs(a.y-b.y)<a.h*0.6;
    if(b.x>a.x+a.w*0.3||sameRow){ sx=a.x+a.w; sy=a.y+a.h/2; tx=b.x; ty=b.y+b.h/2; const dx=Math.max(36,(tx-sx)/2); c1x=sx+dx;c1y=sy;c2x=tx-dx;c2y=ty; }
    else { sx=a.x+a.w/2; sy=a.y+a.h; tx=b.x+b.w/2; ty=b.y+b.h; const dip=Math.max(a.h,b.h)*0.6+34; c1x=sx;c1y=sy+dip;c2x=tx;c2y=ty+dip; }
    paths+='<path d="M'+sx+' '+sy+' C'+c1x+' '+c1y+' '+c2x+' '+c2y+' '+tx+' '+ty+'" fill="none" stroke="var(--accent)" stroke-width="2" marker-end="url(#arw)" opacity=".8"/>'; });
  svg.innerHTML=paths;
}

/* ============================ TEMA + INIT ============================ */
function toggleTheme(){ const root=document.documentElement; const cur=root.getAttribute('data-theme');
  let next; if(cur==='dark')next='light'; else if(cur==='light')next='dark'; else next=matchMedia('(prefers-color-scheme: dark)').matches?'light':'dark';
  root.setAttribute('data-theme',next); try{localStorage.setItem('flowstudio_theme',next);}catch(e){} }
(function init(){
  $('#brandLogo').innerHTML=icon('logo',22);
  $('#btnUndo').innerHTML=icon('undo',17); $('#btnRedo').innerHTML=icon('redo',17);
  $('#icMap').innerHTML=icon('map',16); $('#icVal').innerHTML=icon('check',16);
  $('#icImp').innerHTML=icon('import',16); $('#icExp').innerHTML=icon('export',16); $('#btnTheme').innerHTML=icon('sun',18);
  try{ const th=localStorage.getItem('flowstudio_theme'); if(th) document.documentElement.setAttribute('data-theme',th); }catch(e){}
  try{ const md=localStorage.getItem('flowstudio_mode'); if(md==='ux'||md==='dev') state.mode=md; }catch(e){}
  loadLocal();
  document.body.classList.toggle('mode-ux',isUX());
  document.body.classList.toggle('playing',isPlaying());
  updateModeBtns(); renderUxBar();
  renderPalette(); render(); initEvents();
})();
</script>
